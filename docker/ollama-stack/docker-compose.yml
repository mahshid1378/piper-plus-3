services:
  ollama:
    image: ollama/ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  piper-api:
    build:
      context: ../..
      dockerfile: docker/python-inference/Dockerfile
    ports:
      - "${PIPER_PORT:-8000}:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command:
      - python
      - /app/inference.py
      - --server
      - --model
      - /app/models/model.onnx

volumes:
  ollama_data:
