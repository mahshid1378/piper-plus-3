name: WebUI Tests

on:
  pull_request:
    branches: [ dev ]
    paths:
      - 'src/python_run/piper/webui.py'
      - 'src/python_run/piper/sample_texts.py'
      - 'src/python_run/piper/training_manager.py'
      - 'src/python_run/requirements_webui.txt'
      - 'docker/webui/**'
      - 'src/python_run/tests/test_webui.py'
      - 'src/python_run/tests/test_training_*.py'
      - '.github/workflows/webui-test.yml'
  push:
    branches: [ dev ]
    paths:
      - 'src/python_run/piper/webui.py'
      - 'src/python_run/piper/sample_texts.py'
      - 'src/python_run/piper/training_manager.py'
      - 'src/python_run/requirements_webui.txt'
      - 'docker/webui/**'
      - 'src/python_run/tests/test_webui.py'
      - 'src/python_run/tests/test_training_*.py'
      - '.github/workflows/webui-test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-webui:
    name: Test WebUI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir uv
          uv pip install --system -r src/python_run/requirements_webui.txt
          uv pip install --system pytest pytest-cov
          # Install required runtime dependencies
          uv pip install --system onnxruntime
      
      - name: Test WebUI imports
        run: |
          cd src/python_run
          python -c "from piper.webui import create_interface, get_available_models; print('WebUI imports successful')"
      
      - name: Test model detection
        run: |
          cd src/python_run
          python -c "from pathlib import Path; from piper.webui import get_available_models; models = get_available_models(Path('../../test/models')); print(f'Found {len(models)} test models'); [print(f'  - {name}') for name, path in models]"
      
      - name: Test interface creation
        run: |
          cd src/python_run
          # Skip actual interface creation in CI environment as it requires display
          python -c "from pathlib import Path; from piper.webui import create_interface; print('Interface creation function imported successfully')"
      
      - name: Test template system
        run: |
          cd src/python_run
          python -c "from piper.webui import TEMPLATES, get_language_from_model; print(f'Available languages: {list(TEMPLATES.keys())}'); lang = get_language_from_model('test/models/multilingual-test-medium.onnx'); print(f'Japanese model detected as: {lang}')"
      
      - name: Test sample texts
        run: |
          cd src/python_run
          python -c "from piper.sample_texts import SAMPLE_TEXTS, get_sample_by_category; print(f'Sample text languages: {list(SAMPLE_TEXTS.keys())}'); sample = get_sample_by_category('ja_JP', 'greeting', 0); print(f'Japanese greeting: {sample}')"
      
      - name: Run pytest for WebUI
        run: |
          # Debug: Show current directory and Python path
          pwd
          python -c "import sys; print('Python path:', sys.path)"
          # Run from project root to ensure correct path resolution
          python -m pytest src/python_run/tests/test_webui.py -v --tb=short || true
      
      - name: Run training manager tests
        run: |
          cd src/python_run
          # Debug: Show directory structure
          python -c "import os; print('Tests directory:', os.listdir('tests') if os.path.exists('tests') else 'Not found')"
          python -m pytest tests/test_training_manager.py -v --tb=short || true
      
      - name: Run training integration tests
        run: |
          cd src/python_run
          python -m pytest tests/test_training_integration.py -v -m integration --tb=short || true
        # Allow integration tests to fail as they require full environment

  docker-webui-test:
    name: Test WebUI Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Build WebUI Docker image
        run: |
          docker build -t piper-webui:test -f docker/webui/Dockerfile .
      
      - name: Test container startup
        run: |
          # Run container in background
          docker run -d --name piper-webui-test \
            -p 7861:7860 \
            piper-webui:test

          # Wait for startup
          sleep 10

          # Check if running
          docker ps | grep piper-webui-test

          # Check logs
          docker logs piper-webui-test

          # Cleanup
          docker stop piper-webui-test
          docker rm piper-webui-test

      - name: Inference test - Japanese
        run: |
          mkdir -p /tmp/webui-output
          docker run --rm \
            -v ${{ github.workspace }}/test/models:/models:ro \
            -v /tmp/webui-output:/output \
            --entrypoint python \
            piper-webui:test \
            -c "
          from app import synthesize, find_models
          import soundfile as sf
          models = find_models('/models')
          assert models, 'No models found in /models'
          model = models[0]
          result = synthesize('こんにちは、今日は良い天気ですね。', model, 0, 'ja', 0.667, 1.0, 0.8)
          assert result is not None, 'synthesize returned None'
          sr, audio = result
          sf.write('/output/test_ja.wav', audio, sr)
          print(f'Japanese inference OK: {len(audio)} samples, {sr}Hz')
          "

          FILE_SIZE=$(stat --format=%s /tmp/webui-output/test_ja.wav)
          echo "Output: test_ja.wav ($FILE_SIZE bytes)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Output file too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "WebUI Japanese inference test passed"

      - name: Inference test - English
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test/models:/models:ro \
            -v /tmp/webui-output:/output \
            --entrypoint python \
            piper-webui:test \
            -c "
          from app import synthesize, find_models
          import soundfile as sf
          models = find_models('/models')
          model = models[0]
          result = synthesize('Hello, how are you today?', model, 0, 'en', 0.667, 1.0, 0.8)
          assert result is not None, 'synthesize returned None'
          sr, audio = result
          sf.write('/output/test_en.wav', audio, sr)
          print(f'English inference OK: {len(audio)} samples, {sr}Hz')
          "

          FILE_SIZE=$(stat --format=%s /tmp/webui-output/test_en.wav)
          echo "Output: test_en.wav ($FILE_SIZE bytes)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Output file too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "WebUI English inference test passed"
