name: Test WebAssembly

on:
  push:
    branches: [ dev ]
    paths:
      - 'src/wasm/**'
      - '.github/workflows/test-webassembly.yml'
  pull_request:
    branches: [ dev ]
    paths:
      - 'src/wasm/**'
      - '.github/workflows/test-webassembly.yml'

env:
  NODE_VERSION: '24.x'

jobs:
  test-openjtalk-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: '3.1.47'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential
    
    - name: Create build scripts
      working-directory: src/wasm/openjtalk-web
      run: |
        # Create a simple build script that doesn't require wasm_open_jtalk
        mkdir -p dist
        cat > build-ci.sh << 'EOF'
        #!/bin/bash
        echo "=== CI Build for OpenJTalk WebAssembly ==="
        echo "Creating placeholder files for CI testing..."
        
        # Create placeholder JavaScript module
        cat > dist/openjtalk.js << 'JSEOF'
        // Placeholder OpenJTalk module for CI
        export default function OpenJTalkModule(config) {
          return Promise.resolve({
            FS: { mkdir: () => {}, writeFile: () => {} },
            _openjtalk_initialize: () => 0,
            _openjtalk_synthesis_labels: () => 0,
            _openjtalk_free_string: () => {},
            _openjtalk_clear: () => {},
            allocateUTF8: () => 0,
            UTF8ToString: () => "labels",
            _free: () => {}
          });
        }
        JSEOF
        
        # Create placeholder WASM file
        echo "Placeholder WASM content" > dist/openjtalk.wasm
        
        echo "Build complete!"
        ls -la dist/
        EOF
        
        chmod +x build-ci.sh
        ./build-ci.sh
    
    - name: Verify build outputs
      working-directory: src/wasm/openjtalk-web
      run: |
        ls -la dist/
        test -f dist/openjtalk.js
        test -f dist/openjtalk.wasm
        echo "Build outputs verified"
    
    - name: Run import map validation tests
      working-directory: src/wasm/openjtalk-web
      run: node --test test/js/test-importmap.js

    - name: Install npm dependencies (with local @piper-plus/g2p)
      working-directory: src/wasm/openjtalk-web
      run: npm install "@piper-plus/g2p@file:../g2p"

    - name: Run PiperPlus G2P integration tests
      working-directory: src/wasm/openjtalk-web
      run: |
        node --test test/js/test-piper-plus-g2p-init.js
        node --test test/js/test-piper-plus-wasm-g2p.js

    - name: Run openjtalk-web unit tests
      working-directory: src/wasm/openjtalk-web
      run: |
        node --test \
          test/js/test-piper-plus.js \
          test/js/test-piper-plus-init-success.js \
          test/js/test-piper-plus-boundary.js \
          test/js/test-piper-plus-synthesize-flow.js \
          test/js/test-piper-plus-init-integration.js \
          test/js/test-npm-package.js \
          test/js/test-audio-result.js \
          test/js/test-audio-result-wav-edge.js \
          test/js/test-model-manager.js \
          test/js/test-model-manager-load.js \
          test/js/test-model-manager-boundary.js \
          test/js/test-model-manager-cache.js \
          test/js/test-dictionary-cache.js \
          test/js/test-g2p-golden.js

    - name: Run optimization and advanced tests
      working-directory: src/wasm/openjtalk-web
      run: |
        node --test \
          test/js/test-audio-backend.js \
          test/js/test-audio-regression.js \
          test/js/test-benchmark-runner.js \
          test/js/test-cache-manager.js \
          test/js/test-edge-cases.js \
          test/js/test-memory-pool.js \
          test/js/test-phase2-integration.js \
          test/js/test-resampler.js \
          test/js/test-streaming-pipeline.js \
          test/js/test-webgpu-session.js
    
    - name: Check file sizes
      working-directory: src/wasm/openjtalk-web
      run: |
        echo "Build artifact sizes:"
        ls -lh dist/openjtalk.js dist/openjtalk.wasm
        
        # Check that files are reasonably sized
        wasm_size=$(stat -c%s dist/openjtalk.wasm)
        js_size=$(stat -c%s dist/openjtalk.js)
        
        echo "WASM size: $wasm_size bytes"
        echo "JS size: $js_size bytes"
        
        # Fail if WASM is larger than 1MB (reasonable for OpenJTalk)
        if [ $wasm_size -gt 1048576 ]; then
          echo "ERROR: WASM file is larger than 1MB"
          exit 1
        fi
        
        # Fail if JS is larger than 100KB
        if [ $js_size -gt 102400 ]; then
          echo "ERROR: JS file is larger than 100KB"
          exit 1
        fi
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: openjtalk-web-build
        path: |
          src/wasm/openjtalk-web/dist/
        retention-days: 7