name: Docker Build and Push

on:
  push:
    branches: [dev]
    paths:
      - 'docker/**'
      - 'Dockerfile'
      - 'src/python/**'
      - 'pyproject.toml'
      - 'CMakeLists.txt'
      - '.github/workflows/docker-build.yml'
    tags:
      - 'docker-v*'
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-python-inference:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/python-inference
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push to ghcr.io
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/python-inference/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Docker Hub publish (tag push or workflow_dispatch only) ---
      - name: Check Docker Hub credentials
        if: startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        id: dockerhub-check
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub secrets not configured — skipping Docker Hub publish"
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        id: meta-dockerhub
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/piper-plus-api
          tags: |
            type=semver,pattern={{version}},prefix=
            type=semver,pattern={{major}}.{{minor}},prefix=
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Push to Docker Hub
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/python-inference/Dockerfile
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

