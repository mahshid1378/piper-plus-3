name: Test Japanese TTS

on:
  pull_request:
    branches: [dev]
    paths:
      - 'src/**'
      - 'test/**'
      - '.github/workflows/test-japanese-tts.yml'
      - '.github/workflows/build-piper.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  # Build piper for all platforms
  build:
    name: Build for Japanese TTS tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    uses: ./.github/workflows/build-piper.yml
    with:
      os: ${{ matrix.os }}
      build-type: Release
      include-tests: false
      artifact-name: piper-japanese-${{ matrix.os }}-${{ github.sha }}

  # Run Japanese TTS tests
  test_japanese:
    name: Test Japanese TTS on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      OPENJTALK_DICTIONARY_PATH: ${{ github.workspace }}/piper/share/open_jtalk/dic

    steps:
      - uses: actions/checkout@v6
      
      - name: Download piper artifact
        uses: actions/download-artifact@v8
        with:
          name: piper-japanese-${{ matrix.os }}-${{ github.sha }}
      
      - name: Extract piper (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -xzf piper-${{ runner.os }}.tar.gz
          chmod +x piper/bin/piper
          chmod +x piper/bin/open_jtalk || true
          
          # Set library path for Linux and macOS
          if [ "${{ runner.os }}" = "Linux" ]; then
            export LD_LIBRARY_PATH="${PWD}/piper/lib:${LD_LIBRARY_PATH}"
            echo "LD_LIBRARY_PATH=${PWD}/piper/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          elif [ "${{ runner.os }}" = "macOS" ]; then
            export DYLD_LIBRARY_PATH="${PWD}/piper/lib:${DYLD_LIBRARY_PATH}"
            echo "DYLD_LIBRARY_PATH=${PWD}/piper/lib:${DYLD_LIBRARY_PATH}" >> $GITHUB_ENV
          fi
          
          # Verify OpenJTalk is available (check phonemizer version first)
          if [ -f "piper/bin/open_jtalk_phonemizer" ]; then
            echo "✓ OpenJTalk phonemizer binary found"
            ls -la piper/bin/open_jtalk_phonemizer
            chmod +x piper/bin/open_jtalk_phonemizer || true
          elif [ -f "piper/bin/open_jtalk" ]; then
            echo "✓ OpenJTalk binary found"
            ls -la piper/bin/open_jtalk
          else
            echo "⚠ OpenJTalk binary not found, Japanese TTS may not work"
            echo "Contents of piper/bin:"
            ls -la piper/bin/
          fi
      
      - name: Extract piper (Windows)
        if: runner.os == 'Windows'
        run: |
          Expand-Archive -Path piper-Windows.zip -DestinationPath . -Force
          
          # Verify OpenJTalk is available (check phonemizer version first)
          if (Test-Path "piper/bin/open_jtalk_phonemizer.exe") {
            Write-Host "✓ OpenJTalk phonemizer binary found"
            Get-Item piper/bin/open_jtalk_phonemizer.exe | Select-Object Name, Length, LastWriteTime
          } elseif (Test-Path "piper/bin/open_jtalk.exe") {
            Write-Host "✓ OpenJTalk binary found"
            Get-Item piper/bin/open_jtalk.exe | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Host "⚠ OpenJTalk binary not found, Japanese TTS may not work"
            Write-Host "Contents of piper/bin:"
            Get-ChildItem piper/bin/
          }
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm pytest numpy scipy
      
      - name: Create test model directory
        shell: bash
        run: |
          mkdir -p test/models
          echo "Test model directory created"
      
      - name: Run basic Japanese TTS test
        shell: bash
        run: |
          echo "Testing basic Japanese TTS functionality..."
          if [ "${{ runner.os }}" = "Windows" ]; then
            python scripts/test_japanese_tts.py --basic --piper piper/bin/piper.exe
          else
            python scripts/test_japanese_tts.py --basic --piper piper/bin/piper
          fi
      
      - name: Run comprehensive Japanese tests
        if: success()
        shell: bash
        run: |
          echo "Running comprehensive Japanese tests..."
          if [ "${{ runner.os }}" = "Windows" ]; then
            python scripts/test_japanese_tts.py --comprehensive --piper piper/bin/piper.exe
          else
            python scripts/test_japanese_tts.py --comprehensive --piper piper/bin/piper
          fi
      
      
      # Organize audio artifacts
      - name: Organize Audio Artifacts
        if: always()
        shell: bash
        run: |
          if [ -d "test_results" ]; then
            echo "Organizing audio artifacts..."
            python scripts/organize_audio_artifacts.py --results-dir test_results --create-samples
          else
            echo "No test results directory found"
          fi
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: japanese-tts-test-results-${{ matrix.os }}-run${{ github.run_number }}
          path: |
            test_results/*.wav
            test_results/*.log
            test_results/*.json
            test_results/*.txt
            test_results/performance/*.json
          retention-days: 7
      
      - name: Upload audio artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: japanese-tts-audio-files-${{ matrix.os }}-run${{ github.run_number }}
          path: |
            audio_artifacts/
          retention-days: 7
      
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: japanese-test-logs-${{ matrix.os }}-run${{ github.run_number }}
          path: |
            *.log
            piper/bin/
            test/
          retention-days: 7
  
  # Generate combined summary
  generate_summary:
    name: Generate Combined Summary
    needs: test_japanese
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          pattern: japanese-tts-test-results-*
          path: all-results
      
      - name: Combine results and generate summary
        run: |
          echo "Combining test results from all platforms..."
          
          # Create combined results directory
          mkdir -p combined-results/performance
          
          # Find and combine all performance JSON files
          find all-results -name "performance_summary.json" -o -name "*_metrics_*.json" | while read file; do
            # Extract platform from path
            platform=$(echo "$file" | grep -oE "(ubuntu|macos|windows)-latest" | head -1)
            if [ -n "$platform" ]; then
              # Copy with platform prefix
              cp "$file" "combined-results/performance/japanese_${platform}_$(basename "$file")"
            else
              cp "$file" "combined-results/performance/"
            fi
          done
          
          # Generate combined summary
          python scripts/generate_job_summary.py --results-dir combined-results
      
      - name: Upload combined summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: japanese-tts-combined-summary-run${{ github.run_number }}
          path: |
            combined-results/
          retention-days: 7
