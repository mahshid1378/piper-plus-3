name: C++ Tests

on:
  pull_request:
    branches: [ dev ]
    paths:
      - 'src/cpp/**'
      - 'CMakeLists.txt'
      - '.github/workflows/cpp-tests.yml'
      - '.github/workflows/_build-test-cpp.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cpp-tests:
    uses: ./.github/workflows/_build-test-cpp.yml
    with:
      run-integration-tests: true
      os-matrix: '["ubuntu-latest", "macos-latest"]'
      build-type-matrix: '["Release"]'
