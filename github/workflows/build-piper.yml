name: Build Piper (Reusable)

on:
  workflow_call:
    inputs:
      os:
        description: 'Operating system to build on'
        required: true
        type: string
      build-type:
        description: 'Build type (Release or Debug)'
        required: false
        type: string
        default: 'Release'
      include-tests:
        description: 'Include test build flags'
        required: false
        type: boolean
        default: false
      artifact-name:
        description: 'Name for the build artifact'
        required: false
        type: string
        default: ''
      cache-key-prefix:
        description: 'Cache key prefix for dependency caching'
        required: false
        type: string
        default: 'piper-deps'
    outputs:
      artifact-name:
        description: 'Name of the uploaded artifact'
        value: ${{ jobs.build.outputs.artifact-name }}
      build-path:
        description: 'Path to the build directory'
        value: ${{ jobs.build.outputs.build-path }}

jobs:
  build:
    name: Build on ${{ inputs.os }}
    runs-on: ${{ inputs.os }}
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.name }}
      build-path: ${{ steps.set-build-path.outputs.path }}
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set artifact name
        id: set-artifact-name
        shell: bash
        run: |
          if [ -n "${{ inputs.artifact-name }}" ]; then
            echo "name=${{ inputs.artifact-name }}" >> $GITHUB_OUTPUT
          else
            echo "name=piper-${{ runner.os }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Set build path
        id: set-build-path
        shell: bash
        run: |
          echo "path=${{ github.workspace }}/build" >> $GITHUB_OUTPUT
      
      # Cache for Linux dependencies
      - name: Cache Linux dependencies
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/lib/libonnxruntime*
            /usr/local/include/onnxruntime*
          key: ${{ inputs.cache-key-prefix }}-linux-onnxruntime-1.17.0-v3
      
      # Cache for macOS dependencies
      - name: Cache macOS dependencies
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/lib/libonnxruntime*
            /usr/local/include/onnxruntime*
          key: ${{ inputs.cache-key-prefix }}-macos-${{ runner.arch }}-onnxruntime-1.17.0-v3
      
      # Install dependencies
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential curl wget \
            autoconf automake libtool m4 pkg-config
          
          # Check if ONNX Runtime is already cached
          if [ ! -f "/usr/local/lib/libonnxruntime.so" ]; then
            echo "Installing ONNX Runtime..."
            wget https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-linux-x64-1.17.0.tgz
            tar -xzf onnxruntime-linux-x64-1.17.0.tgz
            sudo cp -r onnxruntime-linux-x64-1.17.0/lib/* /usr/local/lib/
            sudo cp -r onnxruntime-linux-x64-1.17.0/include/* /usr/local/include/
            sudo ldconfig
            rm -rf onnxruntime-linux-x64-1.17.0*
          else
            echo "Using cached ONNX Runtime"
            sudo ldconfig
          fi
      
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Unlink conflicting cmake if exists
          brew unlink cmake || true
          # Install or upgrade cmake from homebrew/core
          brew install --overwrite cmake ninja wget || brew upgrade cmake ninja wget
          
          # Check if ONNX Runtime is already cached
          if [ ! -f "/usr/local/lib/libonnxruntime.dylib" ]; then
            echo "Installing ONNX Runtime for Apple Silicon..."
            sudo mkdir -p /usr/local/lib /usr/local/include
            
            # Only support arm64 (Apple Silicon)
            wget https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-osx-arm64-1.17.0.tgz
            tar -xzf onnxruntime-osx-arm64-1.17.0.tgz
            sudo cp -r onnxruntime-osx-arm64-1.17.0/lib/* /usr/local/lib/
            sudo cp -r onnxruntime-osx-arm64-1.17.0/include/* /usr/local/include/
            rm -rf onnxruntime-osx-arm64-1.17.0*
          else
            echo "Using cached ONNX Runtime"
          fi
      
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      
      # Build Piper
      - name: Build piper (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build
          cd build
          
          # Set CMAKE flags
          CMAKE_FLAGS="-DCMAKE_BUILD_TYPE=${{ inputs.build-type }}"
          if [ "${{ inputs.include-tests }}" = "true" ]; then
            CMAKE_FLAGS="$CMAKE_FLAGS -DBUILD_TESTS=ON"
          fi
          
          echo "Building with flags: $CMAKE_FLAGS"
          
          # Retry cmake configuration up to 3 times with delay for rate limiting
          for i in 1 2 3; do
            if cmake .. $CMAKE_FLAGS; then
              break
            else
              echo "CMake configuration failed (attempt $i/3)"
              if [ $i -lt 3 ]; then
                echo "Waiting 30 seconds before retry..."
                sleep 30
              else
                echo "CMake configuration failed after 3 attempts"
                exit 1
              fi
            fi
          done
          
          if ! make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu); then
            echo "❌ Build failed"
            exit 1
          fi
          echo "Build succeeded"
          
          # For test builds, ensure OpenJTalk binary is in expected locations
          if [ "${{ inputs.include-tests }}" = "true" ] && [ -f "oj/bin/open_jtalk" ]; then
            cp oj/bin/open_jtalk ./
            mkdir -p bin && cp oj/bin/open_jtalk bin/
          fi
          
          # Run tests if enabled
          if [ "${{ inputs.include-tests }}" = "true" ]; then
            echo "Running C++ tests..."
            if [ -f "CTestTestfile.cmake" ] || [ -f "tests/CTestTestfile.cmake" ]; then
              ctest --output-on-failure --verbose || echo "Some tests failed, but continuing..."
            else
              echo "No tests configured, skipping test execution"
            fi
          fi
      
      - name: Build piper (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cd build
          
          # Set CMAKE flags
          $cmakeFlags = @("-G", "Visual Studio 17 2022", "-A", "x64", "-DCMAKE_BUILD_TYPE=${{ inputs.build-type }}")
          if ("${{ inputs.include-tests }}" -eq "true") {
            $cmakeFlags += "-DBUILD_TESTS=ON"
          }
          
          Write-Host "Building with flags: $($cmakeFlags -join ' ')"
          
          # Retry cmake configuration up to 3 times with delay for rate limiting
          $retryCount = 3
          for ($i = 1; $i -le $retryCount; $i++) {
            try {
              cmake .. @cmakeFlags
              break
            }
            catch {
              Write-Host "CMake configuration failed (attempt $i/$retryCount)"
              if ($i -lt $retryCount) {
                Write-Host "Waiting 30 seconds before retry..."
                Start-Sleep -Seconds 30
              }
              else {
                Write-Host "CMake configuration failed after $retryCount attempts"
                exit 1
              }
            }
          }
          
          # 出力をキャプチャせず stdout/stderr を直接表示する
          # ($var = cmake --build ...) は build ログが見えなくなり、piper.exe が
          # 生成されない原因の特定が困難になる。
          cmake --build . --config ${{ inputs.build-type }} --parallel 2 --target piper --verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Build failed (cmake --build returned $LASTEXITCODE)"
            exit 1
          }
          Write-Host "Build succeeded"

          # piper.exe が生成されていない場合は build を失敗扱いにする
          # (CMake が exit 0 を返しても target が出力されない構成不良を検出)
          if (-not (Test-Path "Release/piper.exe") -and -not (Test-Path "piper.exe")) {
            Write-Host "❌ piper.exe not found after build; listing build outputs:"
            Get-ChildItem -Recurse -Filter "*.exe" | Select-Object -First 30 | Format-Table FullName
            Get-ChildItem -Recurse -Filter "*.dll" | Select-Object -First 30 | Format-Table FullName
            exit 1
          }
          
          # Run tests if enabled
          if ("${{ inputs.include-tests }}" -eq "true") {
            Write-Host "Running C++ tests..."
            try {
              ctest -C ${{ inputs.build-type }} --output-on-failure --verbose
            }
            catch {
              Write-Host "Some tests failed, but continuing"
            }
          }
      
      # Create distribution package
      - name: Create distribution package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/piper/bin
          mkdir -p dist/piper/lib
          mkdir -p dist/piper/share
          
          # Copy main binary
          if [ -f "build/piper" ]; then
            cp build/piper dist/piper/bin/
          else
            echo "Warning: piper binary not found at build/piper, checking alternative locations..."
            # Try to find piper binary in other locations
            PIPER_BIN=$(find build -name "piper" -type f -executable 2>/dev/null | head -1)
            if [ -n "$PIPER_BIN" ]; then
              echo "Found piper at: $PIPER_BIN"
              cp "$PIPER_BIN" dist/piper/bin/
            else
              echo "❌ Error: piper binary not found anywhere in build directory"
              echo "Build directory contents:"
              find build -type f -executable 2>/dev/null | head -20 || echo "No executables found"
              exit 1
            fi
          fi
          
          # Copy espeak-ng data
          if [ -d "build/ei/share/espeak-ng-data" ]; then
            cp -r build/ei/share/espeak-ng-data dist/piper/share/
          elif [ -d "build/p/src/piper_phonemize_external-build/install/share/espeak-ng-data" ]; then
            cp -r build/p/src/piper_phonemize_external-build/install/share/espeak-ng-data dist/piper/share/
          elif [ -d "build/pi/share/espeak-ng-data" ]; then
            cp -r build/pi/share/espeak-ng-data dist/piper/share/
          fi
          
          # Copy libraries
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Copy main libraries
            find build -name "*.so*" -type f -exec cp {} dist/piper/lib/ \; 2>/dev/null || true
            # Check specific paths
            [ -d "build/pi/lib" ] && cp build/pi/lib/*.so* dist/piper/lib/ 2>/dev/null || true
            [ -d "build/p/src/piper_phonemize_external-build/install/lib" ] && cp build/p/src/piper_phonemize_external-build/install/lib/*.so* dist/piper/lib/ 2>/dev/null || true
            # Copy ONNX Runtime from system install location (installed by build step)
            cp /usr/local/lib/libonnxruntime*.so* dist/piper/lib/ 2>/dev/null || true
          elif [ "${{ runner.os }}" = "macOS" ]; then
            # Copy main libraries
            find build -name "*.dylib" -type f -exec cp {} dist/piper/lib/ \; 2>/dev/null || true
            # Check specific paths
            [ -d "build/pi/lib" ] && cp build/pi/lib/*.dylib dist/piper/lib/ 2>/dev/null || true
            [ -d "build/p/src/piper_phonemize_external-build/install/lib" ] && cp build/p/src/piper_phonemize_external-build/install/lib/*.dylib dist/piper/lib/ 2>/dev/null || true
            # Copy ONNX Runtime from system install location (installed by build step)
            cp /usr/local/lib/libonnxruntime*.dylib dist/piper/lib/ 2>/dev/null || true
          fi

          # Fix macOS rpath for relocatable distribution
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "Fixing macOS rpath for relocatable distribution..."

            # Fix piper binary rpath
            if [ -f "dist/piper/bin/piper" ]; then
              # Remove all existing rpath entries
              for rpath in $(otool -l dist/piper/bin/piper | grep -A2 'LC_RPATH' | grep 'path ' | awk '{print $2}'); do
                install_name_tool -delete_rpath "$rpath" dist/piper/bin/piper 2>/dev/null || true
              done
              # Add relative rpath
              install_name_tool -add_rpath @executable_path/../lib dist/piper/bin/piper
              echo "Fixed piper binary rpath"
            fi

            # Fix dylib install names to use @rpath
            for dylib in dist/piper/lib/*.dylib; do
              if [ -f "$dylib" ]; then
                basename=$(basename "$dylib")
                install_name_tool -id "@rpath/$basename" "$dylib" 2>/dev/null || true
              fi
            done

            # Verify
            echo "Verification - piper rpath entries:"
            otool -l dist/piper/bin/piper | grep -A2 'LC_RPATH' || echo "No LC_RPATH found"
            echo "Verification - piper linked libraries:"
            otool -L dist/piper/bin/piper
          fi

          # Copy OpenJTalk binary and data
          for oj_path in "build/oj/bin/open_jtalk" "build/open_jtalk" "build/bin/open_jtalk"; do
            if [ -f "$oj_path" ]; then
              cp "$oj_path" dist/piper/bin/
              chmod +x dist/piper/bin/open_jtalk
              break
            fi
          done
          
          # Copy OpenJTalk phonemizer binary
          for oj_path in "build/oj/bin/open_jtalk_phonemizer" "build/open_jtalk_phonemizer" "build/bin/open_jtalk_phonemizer"; do
            if [ -f "$oj_path" ]; then
              cp "$oj_path" dist/piper/bin/
              chmod +x dist/piper/bin/open_jtalk_phonemizer
              break
            fi
          done

          # Download and install OpenJTalk dictionary
          echo "Downloading OpenJTalk dictionary..."
          if curl -L -o naist-jdic.tar.gz "https://sourceforge.net/projects/open-jtalk/files/Dictionary/open_jtalk_dic-1.11/open_jtalk_dic_utf_8-1.11.tar.gz/download"; then
            tar -xzf naist-jdic.tar.gz
            if [ -d "open_jtalk_dic_utf_8-1.11" ]; then
              echo "Installing OpenJTalk dictionary..."
              mkdir -p dist/piper/share/open_jtalk/dic
              cp -r open_jtalk_dic_utf_8-1.11/* dist/piper/share/open_jtalk/dic/
            fi
            # Clean up
            rm -f naist-jdic.tar.gz
            rm -rf open_jtalk_dic_utf_8-1.11
          fi

          # Copy phonemizer dictionaries
          mkdir -p dist/piper/share/piper/dicts
          cp src/cpp/cmudict_data.json dist/piper/share/piper/dicts/ 2>/dev/null || true
          cp src/cpp/pinyin_single.json dist/piper/share/piper/dicts/ 2>/dev/null || true
          cp src/cpp/pinyin_phrases.json dist/piper/share/piper/dicts/ 2>/dev/null || true

          # Create archive
          tar -czf piper-${{ runner.os }}.tar.gz -C dist piper
          
          # Create a debug info file
          echo "Distribution package contents:" > dist-contents.txt
          find dist -type f | sort >> dist-contents.txt
          echo "" >> dist-contents.txt
          echo "Build directory OpenJTalk search:" >> dist-contents.txt
          find build -name "open_jtalk" -type f 2>/dev/null | head -10 >> dist-contents.txt || echo "No open_jtalk found in build" >> dist-contents.txt
      
      - name: Create distribution package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist/piper/bin
          New-Item -ItemType Directory -Force -Path dist/piper/lib
          New-Item -ItemType Directory -Force -Path dist/piper/share
          
          # Copy main binary
          if (Test-Path "build/${{ inputs.build-type }}/piper.exe") {
            Copy-Item "build/${{ inputs.build-type }}/piper.exe" -Destination dist/piper/bin/
          } elseif (Test-Path "build/piper.exe") {
            Copy-Item "build/piper.exe" -Destination dist/piper/bin/
          } else {
            Write-Host "Warning: piper.exe not found, creating minimal package"
          }
          
          # Copy required DLLs (exclude test files like .wav)
          Get-ChildItem "build/${{ inputs.build-type }}/*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination dist/piper/bin/
          
          # Copy espeak-ng data
          $espeakPaths = @(
            "build/ei/share/espeak-ng-data",
            "build/p/src/piper_phonemize_external-build/install/share/espeak-ng-data",
            "build/pi/share/espeak-ng-data"
          )
          foreach ($path in $espeakPaths) {
            if (Test-Path $path) {
              Copy-Item $path -Destination dist/piper/share/ -Recurse -Force
              break
            }
          }
          
          # Copy OpenJTalk executable
          $ojPaths = @(
            "build/oj/bin/open_jtalk.exe",
            "build/open_jtalk.exe",
            "build/bin/open_jtalk.exe",
            "build/${{ inputs.build-type }}/open_jtalk.exe"
          )
          foreach ($path in $ojPaths) {
            if (Test-Path $path) {
              Copy-Item $path -Destination dist/piper/bin/ -Force
              break
            }
          }
          
          # Copy OpenJTalk phonemizer executable
          $ojPhonemizerPaths = @(
            "build/oj/bin/open_jtalk_phonemizer.exe",
            "build/open_jtalk_phonemizer.exe",
            "build/bin/open_jtalk_phonemizer.exe",
            "build/${{ inputs.build-type }}/open_jtalk_phonemizer.exe"
          )
          foreach ($path in $ojPhonemizerPaths) {
            if (Test-Path $path) {
              Copy-Item $path -Destination dist/piper/bin/ -Force
              break
            }
          }

          # Download and install OpenJTalk dictionary
          Write-Host "Downloading OpenJTalk dictionary..."
          # Use curl for better redirect handling on SourceForge
          & curl -L -o naist-jdic.tar.gz "https://sourceforge.net/projects/open-jtalk/files/Dictionary/open_jtalk_dic-1.11/open_jtalk_dic_utf_8-1.11.tar.gz/download"

          # Extract using tar (available in Windows 10+)
          tar -xzf naist-jdic.tar.gz

          # Move dictionary files to the correct location
          if (Test-Path "open_jtalk_dic_utf_8-1.11") {
            Write-Host "Installing OpenJTalk dictionary..."
            New-Item -ItemType Directory -Force -Path dist/piper/share/open_jtalk/dic
            Copy-Item -Path "open_jtalk_dic_utf_8-1.11\*" -Destination "dist/piper/share/open_jtalk/dic/" -Recurse -Force
          } else {
            Write-Host "Warning: Failed to extract OpenJTalk dictionary"
          }

          # Clean up
          Remove-Item -Force naist-jdic.tar.gz -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force open_jtalk_dic_utf_8-1.11 -ErrorAction SilentlyContinue

          # Copy phonemizer dictionaries
          New-Item -ItemType Directory -Force -Path dist/piper/share/piper/dicts
          Copy-Item src/cpp/cmudict_data.json -Destination dist/piper/share/piper/dicts/ -ErrorAction SilentlyContinue
          Copy-Item src/cpp/pinyin_single.json -Destination dist/piper/share/piper/dicts/ -ErrorAction SilentlyContinue
          Copy-Item src/cpp/pinyin_phrases.json -Destination dist/piper/share/piper/dicts/ -ErrorAction SilentlyContinue

          # Create archive
          Compress-Archive -Path dist/piper -DestinationPath piper-${{ runner.os }}.zip
          
          # Create a debug info file
          "Distribution package contents:" | Out-File -FilePath dist-contents.txt
          Get-ChildItem -Path dist -Recurse | Select-Object FullName | Sort-Object FullName | Out-File -FilePath dist-contents.txt -Append
          "" | Out-File -FilePath dist-contents.txt -Append
          "Build directory OpenJTalk search:" | Out-File -FilePath dist-contents.txt -Append
          Get-ChildItem -Path build -Filter "open_jtalk.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 10 | Select-Object FullName | Out-File -FilePath dist-contents.txt -Append
      
      # Upload artifacts
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.set-artifact-name.outputs.name }}
          path: |
            piper-${{ runner.os }}.tar.gz
            piper-${{ runner.os }}.zip
            dist-contents.txt
          retention-days: 1
      
      # Upload build logs on failure
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ runner.os }}-${{ github.sha }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 7