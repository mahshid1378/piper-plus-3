name: dev-build-all

on:
  workflow_call:
    inputs:
      release_upload_url:
        description: 'GitHub Release upload URL'
        required: false
        type: string
      version:
        description: 'Version to build'
        required: false
        type: string
    outputs:
      artifacts_built:
        description: 'Whether artifacts were successfully built'
        value: ${{ jobs.summary.outputs.success }}
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  CMAKE_BUILD_TYPE: Release

permissions:
  contents: write
  packages: read

jobs:
  # Use the reusable build-piper workflow for each platform
  build_linux_x64:
    name: Build Linux x86_64
    uses: ./.github/workflows/build-piper.yml
    with:
      os: ubuntu-24.04
      build-type: Release
      artifact-name: piper-linux-x64
      cache-key-prefix: piper-linux-x64

  build_macos_arm64:
    name: Build macOS ARM64
    uses: ./.github/workflows/build-piper.yml
    with:
      os: macos-14
      build-type: Release
      artifact-name: piper-macos-arm64
      cache-key-prefix: piper-macos-arm64

  build_windows_x64:
    name: Build Windows x64
    uses: ./.github/workflows/build-piper.yml
    with:
      os: windows-2022
      build-type: Release
      artifact-name: piper-windows-x64
      cache-key-prefix: piper-windows-x64

  # ARM builds still need custom Docker-based build
  build_linux_armv7:
    name: Build Linux ARMv7
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build in Docker
        run: |
          # Pull the image first to handle any authentication issues
          docker pull --platform linux/arm/v7 debian:trixie || docker pull debian:trixie
          docker run --rm \
            --platform linux/arm/v7 \
            -v "$(pwd)":/workspace \
            -w /workspace \
            debian:trixie \
            bash -c "
              apt-get update && apt-get install -y \
                build-essential cmake git pkg-config \
                libicu-dev libespeak-ng-dev ninja-build ccache
              mkdir -p build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release -GNinja
              ninja -j1
              cd ..
              mkdir -p dist/piper/bin dist/piper/lib dist/piper/share
              cp build/piper dist/piper/bin/
              find build -name '*.so*' -type f -exec cp {} dist/piper/lib/ \; 2>/dev/null || true

              # Copy espeak-ng-data if available
              if [ -d /usr/share/espeak-ng-data ]; then
                cp -r /usr/share/espeak-ng-data dist/piper/share/
              fi

              cd dist && tar czf piper-linux-armv7.tar.gz piper/
            "

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: piper-linux-armv7
          path: dist/piper-linux-armv7.tar.gz

      - name: Upload to release
        if: inputs.release_upload_url != '' && inputs.release_upload_url != null
        uses: ./.github/actions/retry-upload
        with:
          upload_url: ${{ inputs.release_upload_url }}
          asset_path: dist/piper-linux-armv7.tar.gz
          asset_name: piper-linux-armv7.tar.gz

  build_linux_arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build in Docker
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --build-arg CMAKE_BUILD_TYPE=Release \
            --tag piper-arm64 \
            --file Dockerfile \
            --output type=local,dest=dist \
            .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: piper-linux-arm64
          path: dist/piper-linux-arm64.tar.gz

      - name: Upload to release
        if: inputs.release_upload_url != '' && inputs.release_upload_url != null
        uses: ./.github/actions/retry-upload
        with:
          upload_url: ${{ inputs.release_upload_url }}
          asset_path: dist/piper-linux-arm64.tar.gz
          asset_name: piper-linux-arm64.tar.gz

  # Build Python wheels for PyPI
  build_python_wheels:
    name: Build Python Wheels
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update VERSION file if provided
        if: inputs.version != '' && inputs.version != null
        run: |
          echo "Updating VERSION file to: ${{ inputs.version }}"
          echo "${{ inputs.version }}" > VERSION
          echo "VERSION file updated:"
          cat VERSION

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build wheel
        working-directory: src/python_run
        run: |
          python -m build --wheel --outdir ../../dist/

      - name: List built wheels
        run: ls -la dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-3.11
          path: dist/*.whl

  # Test Python wheels on multiple platforms
  test_python_wheels:
    name: Test Python Wheels (${{ matrix.os }})
    needs: [build_python_wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheels-3.11
          path: dist/

      - name: Install wheel and dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install dist/*.whl
          pip install pyopenjtalk-plus g2p-en pypinyin
          python -c "import nltk; nltk.download('averaged_perceptron_tagger_eng', quiet=True); nltk.download('cmudict', quiet=True)"

      - name: Smoke test all 7 languages
        shell: bash
        env:
          PYTHONUTF8: '1'
        run: |
          python -c "
          from piper.phonemize.multilingual import MultilingualPhonemizer
          mp = MultilingualPhonemizer(languages=['ja', 'en', 'zh', 'es', 'fr', 'pt', 'sv'])
          for lang, text in [('ja', 'こんにちは'), ('en', 'Hello'), ('zh', '你好'), ('es', 'Hola'), ('fr', 'Bonjour'), ('pt', 'Ola'), ('sv', 'Hej')]:
              result = mp.phonemize(text)
              assert len(result) > 3, f'{lang} failed: {len(result)} tokens'
          print('All 7 languages OK')
          "

  # Upload built artifacts to release if URL is provided
  upload_to_release:
    name: Upload to Release
    needs: [build_linux_x64, build_macos_arm64, build_windows_x64]
    if: inputs.release_upload_url != '' && inputs.release_upload_url != null
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - artifact: piper-linux-x64
            asset_name: piper-linux-x64.tar.gz
          - artifact: piper-macos-arm64
            asset_name: piper-macos-arm64.tar.gz
          - artifact: piper-windows-x64
            asset_name: piper-windows-x64.zip
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: List downloaded files
        run: ls -la dist/

      - name: Fix artifact names
        run: |
          # Rename downloaded artifacts to match expected names
          if [ -f "dist/piper-Linux.tar.gz" ]; then
            mv dist/piper-Linux.tar.gz dist/piper-linux-x64.tar.gz
            echo "Renamed piper-Linux.tar.gz to piper-linux-x64.tar.gz"
          fi
          if [ -f "dist/piper-macOS.tar.gz" ]; then
            mv dist/piper-macOS.tar.gz dist/piper-macos-arm64.tar.gz
            echo "Renamed piper-macOS.tar.gz to piper-macos-arm64.tar.gz"
          fi
          if [ -f "dist/piper-Windows.zip" ]; then
            mv dist/piper-Windows.zip dist/piper-windows-x64.zip
            echo "Renamed piper-Windows.zip to piper-windows-x64.zip"
          fi
          echo "Final dist contents:"
          ls -la dist/

      - name: Upload to release
        uses: ./.github/actions/retry-upload
        with:
          upload_url: ${{ inputs.release_upload_url }}
          asset_path: dist/${{ matrix.asset_name }}
          asset_name: ${{ matrix.asset_name }}

  # Summary job
  summary:
    name: Build Summary
    needs: [build_linux_x64, build_macos_arm64, build_windows_x64, build_linux_armv7, build_linux_arm64, build_python_wheels, test_python_wheels]
    if: always()
    runs-on: ubuntu-24.04
    outputs:
      success: ${{ steps.check.outputs.success }}
    steps:
      - name: Check build results
        id: check
        run: |
          if [[ "${{ needs.build_linux_x64.result }}" == "success" ]] && \
             [[ "${{ needs.build_macos_arm64.result }}" == "success" ]] && \
             [[ "${{ needs.build_windows_x64.result }}" == "success" ]] && \
             [[ "${{ needs.build_linux_armv7.result }}" == "success" ]] && \
             [[ "${{ needs.build_linux_arm64.result }}" == "success" ]] && \
             [[ "${{ needs.build_python_wheels.result }}" == "success" ]] && \
             [[ "${{ needs.test_python_wheels.result }}" == "success" ]]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "✅ All builds and tests succeeded!"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Some builds/tests failed:"
            echo "  Linux x64: ${{ needs.build_linux_x64.result }}"
            echo "  macOS ARM64: ${{ needs.build_macos_arm64.result }}"
            echo "  Windows x64: ${{ needs.build_windows_x64.result }}"
            echo "  Linux ARMv7: ${{ needs.build_linux_armv7.result }}"
            echo "  Linux ARM64: ${{ needs.build_linux_arm64.result }}"
            echo "  Python Wheels: ${{ needs.build_python_wheels.result }}"
            echo "  Wheel Tests: ${{ needs.test_python_wheels.result }}"
            exit 1
          fi