name: Docker Tests

on:
  pull_request:
    branches: [dev]
    paths:
      - 'docker/**'
      - 'Dockerfile'
      - 'src/python/**'
      - 'src/cpp/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'pyproject.toml'
      - '.github/workflows/docker-test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test-python-inference:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Build Python inference image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/python-inference/Dockerfile
          push: false
          tags: piper-python-inference:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm piper-python-inference:test python -c "
          import piper_train; print('piper_train OK')
          import onnxruntime as ort; print(f'onnxruntime {ort.__version__} OK')
          print(f'Available providers: {ort.get_available_providers()}')
          import soundfile; print('soundfile OK')
          print('All smoke tests passed')
          "

      - name: WebUI smoke test
        run: |
          docker run --rm piper-python-inference:test python -c "
          import gradio; print(f'gradio {gradio.__version__} OK')
          print('WebUI smoke test passed')
          "

      - name: Test --device cpu providers
        run: |
          docker run --rm piper-python-inference:test python -c "
          import onnxruntime as ort
          providers = ort.get_available_providers()
          assert 'CPUExecutionProvider' in providers, f'CPUExecutionProvider not found in {providers}'
          print(f'CPU provider available: OK')
          print('--device cpu test passed')
          "

      - name: Inference test - Japanese
        run: |
          mkdir -p /tmp/output && chmod 777 /tmp/output
          docker run --rm \
            -v ${{ github.workspace }}/test/models:/models \
            -v /tmp/output:/output \
            -e CUDA_VISIBLE_DEVICES="" \
            -e PIPER_DISABLE_CACHE=1 \
            piper-python-inference:test \
            python inference.py \
              --model /models/multilingual-test-medium.onnx \
              --config /models/multilingual-test-medium.onnx.json \
              --output /output/test_ja.wav \
              --text "こんにちは、今日は良い天気ですね。" \
              --language ja \
              --speaker-id 0 \
              --device cpu

          FILE_SIZE=$(stat --format=%s /tmp/output/test_ja.wav)
          echo "Output: test_ja.wav ($FILE_SIZE bytes)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Output file too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "Japanese inference test passed"

      - name: Inference test - English
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test/models:/models \
            -v /tmp/output:/output \
            -e CUDA_VISIBLE_DEVICES="" \
            -e PIPER_DISABLE_CACHE=1 \
            piper-python-inference:test \
            python inference.py \
              --model /models/multilingual-test-medium.onnx \
              --config /models/multilingual-test-medium.onnx.json \
              --output /output/test_en.wav \
              --text "Hello, how are you today?" \
              --language en \
              --speaker-id 0 \
              --device cpu

          FILE_SIZE=$(stat --format=%s /tmp/output/test_en.wav)
          echo "Output: $OUTPUT_FILE ($FILE_SIZE bytes)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Output file too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "English inference test passed"

      - name: Config auto-detect test - {model}.onnx.json
        run: |
          # Test that --config can be omitted when {model}.onnx.json exists next to the model
          docker run --rm \
            -v ${{ github.workspace }}/test/models:/models \
            -v /tmp/output:/output \
            -e CUDA_VISIBLE_DEVICES="" \
            -e PIPER_DISABLE_CACHE=1 \
            piper-python-inference:test \
            python inference.py \
              --model /models/multilingual-test-medium.onnx \
              --output /output/test_autodetect.wav \
              --text "自動検出テストです。" \
              --language ja \
              --speaker-id 0 \
              --device cpu

          FILE_SIZE=$(stat --format=%s /tmp/output/test_autodetect.wav)
          echo "Output: test_autodetect.wav ($FILE_SIZE bytes)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Output file too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "Config auto-detect ({model}.onnx.json) test passed"

      - name: Config fallback test - config.json
        run: |
          # Test that --config can be omitted when only config.json exists in model directory
          # Create a temp directory with model + config.json (no {model}.onnx.json)
          mkdir -p /tmp/fallback-test
          cp ${{ github.workspace }}/test/models/multilingual-test-medium.onnx /tmp/fallback-test/multilingual-test-medium.onnx
          cp ${{ github.workspace }}/test/models/multilingual-test-medium.onnx.json /tmp/fallback-test/config.json

          docker run --rm \
            -v /tmp/fallback-test:/models/fallback \
            -v /tmp/output:/output \
            -e CUDA_VISIBLE_DEVICES="" \
            -e PIPER_DISABLE_CACHE=1 \
            piper-python-inference:test \
            python inference.py \
              --model /models/fallback/multilingual-test-medium.onnx \
              --output /output/test_fallback.wav \
              --text "Hello, this is a fallback config test." \
              --language en \
              --speaker-id 0 \
              --device cpu

          FILE_SIZE=$(stat --format=%s /tmp/output/test_fallback.wav)
          echo "Output: test_fallback.wav ($FILE_SIZE bytes)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Output file too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "Config fallback (config.json) test passed"

      - name: Config not found error test
        run: |
          # Test that inference exits with error when no config file exists
          mkdir -p /tmp/noconfig
          cp ${{ github.workspace }}/test/models/multilingual-test-medium.onnx /tmp/noconfig/multilingual-test-medium.onnx

          docker run --rm \
            -v /tmp/noconfig:/models/noconfig \
            -v /tmp/output:/output \
            -e CUDA_VISIBLE_DEVICES="" \
            -e PIPER_DISABLE_CACHE=1 \
            piper-python-inference:test \
            python inference.py \
              --model /models/noconfig/multilingual-test-medium.onnx \
              --output /output/should_not_exist.wav \
              --text "This should fail." \
              --language en \
              --speaker-id 0 \
              --device cpu \
            && { echo "ERROR: Expected non-zero exit code but got 0"; exit 1; } \
            || echo "Config not found error test passed (non-zero exit as expected)"

          if [ -f /tmp/output/should_not_exist.wav ]; then
            echo "ERROR: Output file should not exist"
            exit 1
          fi
          echo "Python config not found error test passed"

  test-cpp-inference:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Build C++ inference image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/cpp-inference/Dockerfile
          push: false
          tags: piper-cpp-inference:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm --entrypoint piper piper-cpp-inference:test --version

      - name: Copy G2P dictionary files next to models
        run: |
          cp -f ${{ github.workspace }}/src/cpp/cmudict_data.json ${{ github.workspace }}/test/models/ 2>/dev/null || true
          cp -f ${{ github.workspace }}/src/cpp/pinyin_single.json ${{ github.workspace }}/test/models/ 2>/dev/null || true
          cp -f ${{ github.workspace }}/src/cpp/pinyin_phrases.json ${{ github.workspace }}/test/models/ 2>/dev/null || true

      - name: Inference test - English
        run: |
          mkdir -p /tmp/output && chmod 777 /tmp/output
          echo "Hello, how are you today?" | docker run --rm -i \
            -v ${{ github.workspace }}/test/models:/models \
            -v /tmp/output:/output \
            --entrypoint piper \
            piper-cpp-inference:test \
              --model /models/multilingual-test-medium.onnx \
              --output_file /output/test_en.wav

          FILE_SIZE=$(stat --format=%s /tmp/output/test_en.wav)
          echo "Output: test_en.wav ($FILE_SIZE bytes)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Output file too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "C++ English inference test passed"

      - name: Inference test - Japanese
        run: |
          echo "こんにちは、今日は良い天気ですね。" | docker run --rm -i \
            -v ${{ github.workspace }}/test/models:/models \
            -v /tmp/output:/output \
            --entrypoint piper \
            piper-cpp-inference:test \
              --model /models/multilingual-test-medium.onnx \
              --output_file /output/test_ja.wav

          FILE_SIZE=$(stat --format=%s /tmp/output/test_ja.wav)
          echo "Output: test_ja.wav ($FILE_SIZE bytes)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Output file too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "C++ Japanese inference test passed"

      - name: Config auto-detect test - {model}.onnx.json
        run: |
          # Test that --config can be omitted when {model}.onnx.json exists next to the model
          echo "Auto-detect config test." | docker run --rm -i \
            -v ${{ github.workspace }}/test/models:/models \
            -v /tmp/output:/output \
            --entrypoint piper \
            piper-cpp-inference:test \
              --model /models/multilingual-test-medium.onnx \
              --output_file /output/test_cpp_autodetect.wav

          FILE_SIZE=$(stat --format=%s /tmp/output/test_cpp_autodetect.wav)
          echo "Output: test_cpp_autodetect.wav ($FILE_SIZE bytes)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Output file too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "C++ config auto-detect ({model}.onnx.json) test passed"

      - name: Config fallback test - config.json
        run: |
          # Test that --config can be omitted when only config.json exists in model directory
          # Create a temp directory with model + config.json (no {model}.onnx.json)
          mkdir -p /tmp/fallback-test-cpp
          cp ${{ github.workspace }}/test/models/multilingual-test-medium.onnx /tmp/fallback-test-cpp/multilingual-test-medium.onnx
          cp ${{ github.workspace }}/test/models/multilingual-test-medium.onnx.json /tmp/fallback-test-cpp/config.json
          # Copy G2P dictionary files for multilingual inference
          cp ${{ github.workspace }}/src/cpp/cmudict_data.json /tmp/fallback-test-cpp/ 2>/dev/null || true
          cp ${{ github.workspace }}/src/cpp/pinyin_single.json /tmp/fallback-test-cpp/ 2>/dev/null || true
          cp ${{ github.workspace }}/src/cpp/pinyin_phrases.json /tmp/fallback-test-cpp/ 2>/dev/null || true

          echo "Fallback config test." | docker run --rm -i \
            -v /tmp/fallback-test-cpp:/models/fallback \
            -v /tmp/output:/output \
            --entrypoint piper \
            piper-cpp-inference:test \
              --model /models/fallback/multilingual-test-medium.onnx \
              --output_file /output/test_cpp_fallback.wav

          FILE_SIZE=$(stat --format=%s /tmp/output/test_cpp_fallback.wav)
          echo "Output: test_cpp_fallback.wav ($FILE_SIZE bytes)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Output file too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "C++ config fallback (config.json) test passed"

      - name: Config not found error test
        run: |
          # Test that piper exits with error when no config file exists
          mkdir -p /tmp/noconfig-cpp
          cp ${{ github.workspace }}/test/models/multilingual-test-medium.onnx /tmp/noconfig-cpp/multilingual-test-medium.onnx

          echo "This should fail." | docker run --rm -i \
            -v /tmp/noconfig-cpp:/models/noconfig \
            -v /tmp/output:/output \
            --entrypoint piper \
            piper-cpp-inference:test \
              --model /models/noconfig/multilingual-test-medium.onnx \
              --output_file /output/should_not_exist_cpp.wav \
            && { echo "ERROR: Expected non-zero exit code but got 0"; exit 1; } \
            || echo "Config not found error test passed (non-zero exit as expected)"

          if [ -f /tmp/output/should_not_exist_cpp.wav ]; then
            echo "ERROR: Output file should not exist"
            exit 1
          fi
          echo "C++ config not found error test passed"

  test-python-train:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/graalvm /usr/local/.ghcup /usr/local/share/powershell \
            /opt/hostedtoolcache \
            /usr/share/swift /usr/share/miniconda /usr/share/az_* \
            /usr/local/julia* /opt/microsoft /opt/pipx
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "--- Disk space after cleanup ---"
          df -h /
          avail_gb=$(df / --output=avail -BG | tail -1 | tr -d ' G')
          if [ "$avail_gb" -lt 40 ]; then
            echo "::warning::Low disk space (${avail_gb}G). Build may fail on small runners."
          fi

      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Build Python train image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/python-train/Dockerfile
          push: false
          tags: piper-python-train:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm piper-python-train:test python -c "
          import torch; print(f'PyTorch {torch.__version__} OK')
          import pytorch_lightning; print(f'PyTorch Lightning {pytorch_lightning.__version__} OK')
          import piper_train; print('piper_train OK')
          import onnxruntime as ort; print(f'onnxruntime {ort.__version__} OK')
          print('All smoke tests passed')
          "

      - name: NLTK data availability test
        run: |
          docker run --rm piper-python-train:test python -c "
          import nltk
          nltk.data.find('taggers/averaged_perceptron_tagger_eng')
          print('averaged_perceptron_tagger_eng: OK')
          nltk.data.find('corpora/cmudict')
          print('cmudict: OK')
          print('NLTK data test passed')
          "

      - name: English phonemizer test
        run: |
          docker run --rm piper-python-train:test python -c "
          from g2p_en import G2p
          g2p = G2p()
          result = g2p('Hello world')
          assert result, 'g2p-en returned empty result'
          print(f'g2p-en output: {result}')
          print('English phonemizer test passed')
          "

  test-cpp-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Build C++ test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/cpp-inference/Dockerfile.test
          push: false
          tags: piper-cpp-tests:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run C++ unit tests
        run: |
          # Dockerfile.test already runs tests during build
          # Just verify the image was built successfully
          echo "C++ unit tests passed (executed during Docker build)"
